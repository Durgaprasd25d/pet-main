name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"   # Runs every 15 minutes (GitHub minimum)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Backend
        run: |
          curl -f -i https://pet-main.onrender.com || curl -f -i https://pet-main.onrender.com || exit 0
        continue-on-error: true